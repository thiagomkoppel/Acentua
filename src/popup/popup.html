<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Acentua</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <main>
      <h1>Acentua</h1>
      <section class="mode-card" aria-labelledby="mode-title">
        <p id="mode-title" class="label">Portuguese mode</p>

          class="toggle"
          type="button"
          aria-pressed="false"
          disabled

      </section>
      <button id="options" class="secondary" type="button">Options</button>
    </main>
    <script type="module" src="popup.js"></script>
  </body>
